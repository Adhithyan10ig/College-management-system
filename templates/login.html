<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin-Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0d1117;
        --card: #161b22;
        --border: #30363d;
        --accent: #e8a945;
        --accent2: #c47f17;
        --text: #000000;
        --muted: #7d8590;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: var(--bg);
        font-family: "DM Sans", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(232, 169, 69, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(232, 169, 69, 0.04) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
      }
      .glow {
        position: fixed;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(232, 169, 69, 0.12) 0%,
          transparent 70%
        );
        top: -100px;
        left: -100px;
        pointer-events: none;
        animation: drift 8s ease-in-out infinite alternate;
      }
      @keyframes drift {
        from {
          transform: translate(0, 0);
        }
        to {
          transform: translate(80px, 60px);
        }
      }
      .card {
        position: relative;
        background: white;
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 48px 44px;
        width: 420px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
        animation: fadeUp 0.6s ease both;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 36px;
      }

      .logo img {
        width: 100%;
        height: auto;
        align-items: center;
      }
      .logo-icon {
        width: 44px;
        height: 44px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
      }
      .logo-text {
        font-family: "Playfair Display", serif;
        font-size: 22px;
        color: var(--text);
        letter-spacing: -0.3px;
      }
      .logo-sub {
        font-size: 12px;
        color: var(--muted);
        margin-top: 1px;
      }
      h2 {
        font-family: "Playfair Display", serif;
        font-size: 28px;
        color: var(--text);
        margin-bottom: 6px;
      }
      .subtitle {
        color: var(--muted);
        font-size: 14px;
        margin-bottom: 32px;
        text-align: center;
      }
      label {
        display: block;
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 6px;
        font-weight: 500;
      }
      input[type="text"],
      input[type="password"] {
        width: 100%;
        background: white;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 16px;
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        margin-bottom: 20px;
      }
      input:focus {
        border-color: #000000;
        box-shadow: #0b518f;
      }
      .error {
        background: rgba(248, 81, 73, 0.1);
        border: 1px solid rgba(248, 81, 73, 0.3);
        color: #f85149;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 13px;
        margin-bottom: 20px;
      }
      button[type="submit"] {
        width: 100%;
        background: #0859a2;
        color: #ffffff;
        border: none;
        border-radius: 8px;
        padding: 13px;
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        letter-spacing: 0.2px;
        transition:
          opacity 0.2s,
          transform 0.1s;
      }
      button:hover {
        opacity: 0.9;
      }
      button:active {
        transform: scale(0.99);
      }
      .hint {
        text-align: center;
        margin-top: 20px;
        font-size: 12px;
        color: var(--muted);
      }
      .hint span {
        color: var(--accent);
      }
      h2 {
        text-align: center;
        color: #0d1117;
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div> <div class="glow"></div>
    <div class="card">
      <div class="logo">
        <img
          src="https://www.adishankara.ac.in/assets/images/logo.png"
          alt="Logo"
        />
      </div>
      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to access the dashboard</p>
      {% if error %}
      <div class="error">⚠ {{ error }}</div>
      {% endif %}
      <form method="POST">
        <label>Username</label>
        <input
          type="text"
          name="username"
          placeholder="Enter your username"
          required
          autofocus
        />
        <label>Password</label>
        <input
          type="password"
          name="password"
          placeholder="Enter your password"
          required
        />
        <button type="submit">Sign In</button>
      </form>
      
    </div>
  </body>
</html>
